networks:
  agent_network:
    driver: bridge

services:
  app:
    build: ./app
    container_name: langchain-ollama
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app
    depends_on:
      - ollama
      - agent_mongodb
    networks:
      - agent_network

  ollama:
    image: ollama/ollama:0.20.7
    container_name: ollama
    restart: always
    ports:
      - "11440:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - agent_network

  agent_mongodb:
    image: mongodb/mongodb-atlas-local
    hostname: agent_mongodb
    container_name: agent_mongodb_container
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - db:/data/db
      - configdb:/data/configdb
      - mongot:/data/mongot
    networks:
      - agent_network
    environment:
      - ATLAS_LOCAL_DEPLOYMENT=true
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin


  frontend_streamlit:
    build: ./streamlit_app
    container_name: intelligent_agent_dashboard
    restart: always
    ports:
      - "8501:8501"
    volumes:
      - ./streamlit_app:/app
      - streamlit_data_v1:/app/data
    depends_on:
      - app
      - agent_mongodb
    networks:
      - agent_network
  frontend_react:
    build: ./react_app
    container_name: intelligent_agent_react_ui
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./react_app:/app
      - /app/node_modules
    depends_on:
      - app
      - agent_mongodb
    networks:
      - agent_network

volumes:
  ollama_data:
  db:
  configdb:
  mongot:
  streamlit_data_v1: